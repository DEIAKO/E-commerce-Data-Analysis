kind = "data-app"
previewPath = "/"
title = "Python Data Analysis"
version = "1.0.0"
id = "artifacts/data-analysis"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20144

[services.development]
run = "pnpm --filter @workspace/data-analysis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/data-analysis", "run", "build" ]
publicDir = "artifacts/data-analysis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20144"
BASE_PATH = "/"
